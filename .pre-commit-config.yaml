minimum_pre_commit_version: "4.0.0"
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: eslint
        name: eslint
        entry: npx eslint --fix --max-warnings=0
        language: system
        files: ^web/src/.*\.(js|jsx|ts|tsx)$

      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        files: ^(web/.*\.(js|jsx|css|html)|eslint\.config\.js|\.pre-commit-config\.yaml|.*\.(json|md))$

      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd rust && cargo fmt --check'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd rust && cargo clippy -- -D warnings'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false
